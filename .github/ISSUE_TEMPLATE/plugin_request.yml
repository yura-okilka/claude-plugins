name: Plugin or feature request
description: Suggest a new plugin for the marketplace, or a feature for an existing one.
title: "[request] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Describe what you'd like to see.
  - type: dropdown
    id: kind
    attributes:
      label: Request type
      options:
        - New plugin
        - Feature for an existing plugin
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Plugin name
      description: For an existing plugin, which one? For a new plugin, a proposed name.
      placeholder: toast-notify
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should the plugin or feature do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or existing workarounds. Optional.
    validations:
      required: false
